version: "3"

tasks:
  codex: bunx @openai/codex --yolo
  cursor: agent --yolo

  reindex:
    cmd: uvx code-review-graph build
    sources:
      - "src/**/*"

  check:
    desc: Run publish-safe repo validation
    cmd: bun check
    sources:
      - "src/**/*.ts"

  build:
    desc: Emit publish artifacts into dist/
    deps: [check]
    cmd: bun run build
    sources:
      - "src/**/*.ts"
      - "package.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
    generates:
      - "dist/**/*"

  publish:dry-run:
    desc: Build and inspect publish payload
    deps: [build]
    cmd: bun publish --dry-run --access public

  publish:auth:
    desc: Refuse publish with missing or expired repo-local npm auth
    cmd: bun pm whoami
    sources:
      - .npmrc

  publish:guard:
    desc: Refuse publish on wrong branch dirty tree
    cmd: bun scripts/publish-guard.ts

  publish:
    desc: Publish current version to npm latest
    deps: [build, publish:auth, publish:guard]
    cmds:
      - bun publish --access public
      - git tag "$(jq -r .version package.json)"
